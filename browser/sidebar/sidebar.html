<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../node_modules/@fortawesome/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="app">
    <div id="register" class="hidden">
      <p>Give this browser a name so Penny knows which device you're on.</p>
      <input id="device-label" type="text" placeholder="e.g. firefox macbook 16">
      <button id="register-btn"><i class="fa-solid fa-right-to-bracket"></i> Register</button>
    </div>

    <div id="chat" class="hidden">
      <div id="nav-bar">
        <div id="nav-top">
          <a id="nav-logo" class="nav-link" title="Open Penny page">
            <img src="../penny.svg" alt="Penny" class="nav-icon">
            <span id="nav-title">Penny</span>
            <span id="nav-thoughts-count"></span>
          </a>
          <span id="status" class="disconnected"></span>
          <span id="tool-use-icon" class="hidden" title="Tool use enabled"><i class="fa-solid fa-wrench"></i></span>
        </div>
      </div>
      <div id="conversation-panel">
        <div id="messages-wrapper">
          <div id="messages"></div>
        </div>
        <div id="permission-dialog" class="hidden">
          <p>Penny wants to browse <strong id="permission-domain"></strong></p>
          <p class="permission-url" id="permission-url"></p>
          <div class="permission-actions">
            <button id="permission-allow"><i class="fa-solid fa-check"></i> Allow</button>
            <button id="permission-deny" class="deny"><i class="fa-solid fa-xmark"></i> Deny</button>
          </div>
        </div>
        <div id="page-context-bar" class="hidden">
          <div id="page-context-header">
            <img id="page-context-favicon" src="" alt="">
            <span id="page-context-title"></span>
          </div>
          <label id="page-context-label">
            <input type="checkbox" id="page-context-toggle" checked>
            <i class="fa-solid fa-file-lines"></i> Include page content with message
          </label>
        </div>
        <div id="input-area">
          <textarea id="input" placeholder="Message Penny..." rows="1"></textarea>
          <button id="send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="../dist/sidebar/sidebar.js"></script>
</body>
</html>
