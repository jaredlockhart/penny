<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../node_modules/@fortawesome/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="app">
    <div id="register" class="hidden">
      <p>Give this browser a name so Penny knows which device you're on.</p>
      <input id="device-label" type="text" placeholder="e.g. firefox macbook 16">
      <button id="register-btn"><i class="fa-solid fa-right-to-bracket"></i> Register</button>
    </div>

    <div id="chat" class="hidden">
      <div id="nav-bar">
        <div id="nav-top">
          <img src="../penny.svg" alt="Penny" class="nav-icon">
          <span id="nav-title">Penny</span>
          <span id="status" class="disconnected"></span>
          <span id="tool-use-icon" class="hidden" title="Tool use enabled"><i class="fa-solid fa-wrench"></i></span>
          <button id="nav-prompts"><i class="fa-solid fa-scroll"></i></button>
          <button id="nav-settings" aria-label="Settings"><i class="fa-solid fa-gear"></i></button>
        </div>
        <div id="main-tabs">
          <button class="main-tab active" data-mtab="conversation"><i class="fa-solid fa-comment"></i> Chat</button>
          <button class="main-tab" data-mtab="schedules"><i class="fa-solid fa-clock"></i> Schedules</button>
          <button id="nav-thoughts" class="main-tab"><i class="fa-regular fa-lightbulb"></i> Thoughts<span id="nav-thoughts-count"></span></button>
        </div>
      </div>
      <div id="conversation-panel">
        <div id="messages-wrapper">
          <div id="messages"></div>
        </div>
        <div id="permission-dialog" class="hidden">
          <p>Penny wants to browse <strong id="permission-domain"></strong></p>
          <p class="permission-url" id="permission-url"></p>
          <div class="permission-actions">
            <button id="permission-allow"><i class="fa-solid fa-check"></i> Allow</button>
            <button id="permission-deny" class="deny"><i class="fa-solid fa-xmark"></i> Deny</button>
          </div>
        </div>
        <div id="page-context-bar" class="hidden">
          <div id="page-context-header">
            <img id="page-context-favicon" src="" alt="">
            <span id="page-context-title"></span>
          </div>
          <label id="page-context-label">
            <input type="checkbox" id="page-context-toggle" checked>
            <i class="fa-solid fa-file-lines"></i> Include page content with message
          </label>
        </div>
        <div id="input-area">
          <textarea id="input" placeholder="Message Penny..." rows="1"></textarea>
          <button id="send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
      </div>
      <div id="schedules-panel" class="hidden">
        <div class="schedules-list" id="schedules-list"></div>
        <div class="schedules-add">
          <input type="text" id="schedules-input" placeholder="daily 9am check the news">
          <button id="schedules-add-btn"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>
    </div>

    <div id="settings" class="hidden">
      <div id="settings-header">
        <button id="settings-back" aria-label="Back"><i class="fa-solid fa-arrow-left"></i></button>
        <span id="settings-title">Settings</span>
      </div>
      <div id="settings-tabs">
        <button class="settings-tab active" data-stab="likes"><i class="fa-solid fa-heart"></i> Likes</button>
        <button class="settings-tab" data-stab="dislikes"><i class="fa-solid fa-heart-crack"></i> Dislikes</button>
        <button class="settings-tab" data-stab="domains"><i class="fa-solid fa-globe"></i> Domains</button>
        <button class="settings-tab" data-stab="config"><i class="fa-solid fa-sliders"></i> Config</button>
      </div>

      <div id="stab-likes" class="stab-panel">
        <div class="prefs-list" id="likes-list"></div>
        <div class="prefs-add">
          <input type="text" id="likes-input" placeholder="Add a like...">
          <button id="likes-add-btn"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>

      <div id="stab-dislikes" class="stab-panel hidden">
        <div class="prefs-list" id="dislikes-list"></div>
        <div class="prefs-add">
          <input type="text" id="dislikes-input" placeholder="Add a dislike...">
          <button id="dislikes-add-btn"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>

      <div id="stab-domains" class="stab-panel hidden">
        <div class="domains-list" id="domains-list"></div>
        <div class="domains-add">
          <input type="text" id="domains-input" placeholder="example.com">
          <select id="domains-permission">
            <option value="allowed">Allow</option>
            <option value="blocked">Block</option>
          </select>
          <button id="domains-add-btn"><i class="fa-solid fa-plus"></i></button>
        </div>
      </div>

      <div id="stab-config" class="stab-panel hidden">
        <div id="tool-use-row" class="config-toggle-row">
          <label for="tool-use-toggle"><i class="fa-solid fa-wrench"></i> Allow tool use</label>
          <input type="checkbox" id="tool-use-toggle">
        </div>
        <div id="config-list"></div>
      </div>
    </div>
  </div>
  <div id="toast"></div>
  <script type="module" src="../dist/sidebar/sidebar.js"></script>
</body>
</html>
