<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Penny's Prompt Logs</title>
  <link rel="icon" href="../icons/icon-48.png">
  <link rel="stylesheet" href="../node_modules/@fortawesome/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="prompts.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <h1><img src="../penny.svg" alt="Penny" id="header-icon"> Prompt Logs</h1>
      <select id="agent-filter">
        <option value="">All agents</option>
      </select>
    </div>
    <div id="loading">Loading prompt logs...</div>
    <div id="runs"></div>
    <div id="load-more" class="hidden">
      <button id="load-more-btn"><i class="fa-solid fa-chevron-down"></i> Load more</button>
    </div>
  </div>
  <script type="module" src="../dist/prompts/prompts.js"></script>
</body>
</html>
