<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Penny</title>
  <link rel="icon" href="../icons/icon-48.png">
  <link rel="stylesheet" href="../node_modules/@fortawesome/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="page.css">
  <script type="module" src="../dist/page/page.js"></script>
</head>
<body>
<div id="app">
  <div id="header">
    <h1><img src="../penny.svg" alt="Penny" id="header-icon"> Penny</h1>
    <div id="tabs">
      <button class="tab active" data-tab="thoughts"><i class="fa-regular fa-lightbulb"></i> Thoughts</button>
      <button class="tab" data-tab="prompts"><i class="fa-solid fa-scroll"></i> Prompts</button>
      <button class="tab" data-tab="schedules"><i class="fa-solid fa-clock"></i> Schedules</button>
      <button class="tab" data-tab="likes"><i class="fa-solid fa-heart"></i> Likes</button>
      <button class="tab" data-tab="dislikes"><i class="fa-solid fa-heart-crack"></i> Dislikes</button>
      <button class="tab" data-tab="domains"><i class="fa-solid fa-globe"></i> Domains</button>
      <button class="tab" data-tab="config"><i class="fa-solid fa-sliders"></i> Config</button>
    </div>
  </div>

  <!-- Thoughts panel -->
  <div id="panel-thoughts" class="panel">
    <div id="thought-tabs">
      <button class="thought-tab active" data-ttab="new"><i class="fa-solid fa-star"></i> New</button>
      <button class="thought-tab" data-ttab="archive"><i class="fa-solid fa-box-archive"></i> Archive</button>
    </div>
    <div id="loading">Loading thoughts...</div>
    <div id="grid"></div>
    <div id="thoughts-load-more" class="hidden">
      <button id="thoughts-load-more-btn" class="load-more-btn"><i class="fa-solid fa-chevron-down"></i> Load more</button>
    </div>
  </div>

  <!-- Prompts panel -->
  <div id="panel-prompts" class="panel hidden">
    <div id="agent-tabs">
      <button class="sub-tab active" data-agent=""><i class="fa-solid fa-layer-group"></i> All</button>
      <button class="sub-tab" data-agent="inner_monologue"><i class="fa-regular fa-lightbulb"></i> Thinking</button>
      <button class="sub-tab" data-agent="chat"><i class="fa-solid fa-comment"></i> Chat</button>
      <button class="sub-tab" data-agent="notify"><i class="fa-solid fa-bell"></i> Notify</button>
      <button class="sub-tab" data-agent="history"><i class="fa-solid fa-clock-rotate-left"></i> History</button>
    </div>
    <div id="prompts-loading" class="panel-loading">Loading prompt logs...</div>
    <div id="runs"></div>
    <div id="prompts-load-more" class="hidden">
      <button id="prompts-load-more-btn" class="load-more-btn"><i class="fa-solid fa-chevron-down"></i> Load more</button>
    </div>
  </div>

  <!-- Schedules panel -->
  <div id="panel-schedules" class="panel hidden">
    <div class="schedules-add">
      <input type="text" id="schedules-input" placeholder="daily 9am check the news">
      <button id="schedules-add-btn"><i class="fa-solid fa-plus"></i></button>
    </div>
    <div class="schedules-list" id="schedules-list"></div>
  </div>

  <!-- Likes panel -->
  <div id="panel-likes" class="panel hidden">
    <div class="prefs-add">
      <input type="text" id="likes-input" placeholder="Add a like...">
      <button id="likes-add-btn"><i class="fa-solid fa-plus"></i></button>
    </div>
    <div class="prefs-list" id="likes-list"></div>
  </div>

  <!-- Dislikes panel -->
  <div id="panel-dislikes" class="panel hidden">
    <div class="prefs-add">
      <input type="text" id="dislikes-input" placeholder="Add a dislike...">
      <button id="dislikes-add-btn"><i class="fa-solid fa-plus"></i></button>
    </div>
    <div class="prefs-list" id="dislikes-list"></div>
  </div>

  <!-- Domains panel -->
  <div id="panel-domains" class="panel hidden">
    <div class="domains-add">
      <input type="text" id="domains-input" placeholder="example.com">
      <select id="domains-permission">
        <option value="allowed">Allow</option>
        <option value="blocked">Block</option>
      </select>
      <button id="domains-add-btn"><i class="fa-solid fa-plus"></i></button>
    </div>
    <div class="domains-list" id="domains-list"></div>
  </div>

  <!-- Config panel -->
  <div id="panel-config" class="panel hidden">
    <div id="tool-use-row" class="config-toggle-row">
      <label for="tool-use-toggle"><i class="fa-solid fa-wrench"></i> Allow tool use</label>
      <input type="checkbox" id="tool-use-toggle">
    </div>
    <div id="config-list"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="hidden">
  <div id="modal-backdrop"></div>
  <div id="modal-wrapper">
    <div id="modal-content">
      <img id="modal-image" src="" alt="">
      <div id="modal-body">
        <div id="modal-title"></div>
        <div id="modal-date"></div>
        <div id="modal-text"></div>
      </div>
      <button id="modal-close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="modal-actions" class="hidden">
      <button id="modal-thumbs-up" class="reaction-btn thumbs-up"><i class="fa-solid fa-thumbs-up"></i></button>
      <button id="modal-thumbs-down" class="reaction-btn thumbs-down"><i class="fa-solid fa-thumbs-down"></i></button>
    </div>
  </div>
</div>
<div id="toast"></div>
</body>
</html>
